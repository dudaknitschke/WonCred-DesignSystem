<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when a library tries to polyfill fetch by assignment in some environments.
      (function() {
        try {
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && !descriptor.writable && !descriptor.set && descriptor.configurable) {
            Object.defineProperty(window, 'fetch', {
              value: window.fetch,
              writable: true,
              configurable: true
            });
          }
        } catch (e) {
          // Ignore errors as this is a best-effort fix
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
